<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMO Web UI — gov_langgraph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
    }
    .section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .form-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    input, textarea {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      min-width: 160px;
      flex: 1;
      font-family: inherit;
    }
    textarea { min-height: 60px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; cursor: not-allowed; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }
    button.success { background: #22c55e; }
    button.success:hover { background: #16a34a; }
    button.secondary { background: #475569; }
    button.secondary:hover { background: #64748b; }
    .output {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 48px;
      max-height: 200px;
      overflow-y: auto;
    }
    .output.ok { border-color: #22c55e; }
    .output.error { border-color: #ef4444; }
    .output.warn { border-color: #f59e0b; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    /* Gate panel */
    .gate-panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .gate-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #334155;
    }
    .gate-title { font-size: 1rem; font-weight: 600; color: #f8fafc; }
    .gate-task-id { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .gate-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .badge-pending { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
    .badge-approved { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
    .badge-rejected { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
    .gate-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 1rem;
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
    }
    .gate-meta dt { color: #64748b; }
    .gate-meta dd { color: #cbd5e1; }
    .gate-evidence {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.75rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
    .gate-evidence-title { font-weight: 600; color: #94a3b8; margin-bottom: 0.25rem; }
    .gate-evidence-note { font-style: italic; color: #64748b; font-size: 0.75rem; margin-top: 0.25rem; }
    .gate-decision-area { }
    .gate-already-decided {
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.75rem;
      border-radius: 4px;
      text-align: center;
    }
    .already-approved { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
    .already-rejected { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
    .decision-note-hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.25rem;
    }
    .rejection-required { color: #ef4444; font-size: 0.8rem; margin-top: 0.25rem; }
    .gate-actor-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .gate-actor-row input { min-width: 200px; }
    @media (max-width: 640px) {
      .two-col { grid-template-columns: 1fr; }
      input, textarea { min-width: 100%; }
      .gate-actor-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <h1>PMO Web UI</h1>
  <p class="subtitle">gov_langgraph — non-authoritative shell</p>

  <!-- ── PROJECTS ── -->
  <div class="section">
    <div class="section-title">Projects</div>
    <div class="form-row">
      <input id="proj-name" placeholder="Project name" style="flex:2" />
      <select id="proj-status" style="max-width:130px">
        <option value="active">Active</option>
        <option value="on_hold">On Hold</option>
        <option value="closed">Closed</option>
        <option value="shutdown">Shutdown</option>
      </select>
      <input id="proj-owner" placeholder="Owner" style="max-width:140px" />
      <button class="success" onclick="doCreateProject()">Create Project</button>
    </div>
    <div class="output" id="proj-output">Response will appear here…</div>
  </div>

  <!-- ── GATE PANEL ── -->
  <div class="section">
    <div class="section-title">Gate Confirmation</div>
    <div class="form-row">
      <input id="gate-task-id" placeholder="Task ID" style="max-width:320px" />
      <button onclick="doLoadGate()">Load Gate</button>
    </div>
    <div id="gate-panel"></div>
  </div>

  <!-- ── VIEW STATUS ── -->
  <div class="section">
    <div class="section-title">View Status</div>
    <div class="form-row">
      <input id="status-task-id" placeholder="Task ID" />
      <button onclick="doStatus()">Get Status</button>
    </div>
    <div class="output" id="status-output">Response will appear here…</div>
  </div>

  <!-- ── KICKOFF ── -->
  <div class="section">
    <div class="section-title">Announce Kickoff</div>
    <div class="form-row">
      <select id="kickoff-project" style="flex:2">
        <option value="">(loading projects…)</option>
      </select>
      <button onclick="loadProjects()" style="max-width:80px">Refresh</button>
    </div>
    <div class="form-row">
      <input id="kickoff-title" placeholder="Task title" style="flex:2" />
    </div>
    <div class="form-row">
      <textarea id="kickoff-description" placeholder="Description — what is this work?" style="min-height:60px;flex:2"></textarea>
    </div>
    <div class="form-row">
      <select id="kickoff-priority" style="max-width:100px">
        <option value="0">P0</option>
        <option value="1">P1</option>
        <option value="2" selected>P2</option>
        <option value="3">P3</option>
      </select>
      <input id="kickoff-assignee" placeholder="Assignee (optional — leave blank for unassigned)" style="flex:2" />
      <input id="kickoff-actor" placeholder="Your name" style="max-width:160px" />
    </div>
    <div class="form-row">
      <button class="success" onclick="doKickoff()">Announce Kickoff</button>
    </div>
    <div class="output" id="kickoff-output">Response will appear here…</div>
  </div>

  <!-- ── LIST TASKS ── -->
  <div class="section">
    <div class="section-title">List Tasks</div>
    <div class="form-row">
      <input id="list-project" placeholder="Project ID" />
      <button onclick="doList()">List</button>
    </div>
    <div class="output" id="list-output">Response will appear here…</div>
  </div>

<script>
  const BASE = '';
  let _projects = [];  // cached project list

  async function loadProjects() {
    try {
      const r = await fetch(BASE + '/projects');
      const d = await r.json();
      if (d.ok) {
        _projects = (d.projects || []).filter(p => p.project_status === 'active');
      }
    } catch(e) { _projects = []; }
    _populateProjectSelect();
  }

  function _populateProjectSelect() {
    const sel = document.getElementById('kickoff-project');
    if (!sel) return;
    sel.innerHTML = '';
    if (_projects.length === 0) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = '(no active projects — create one first)';
      sel.appendChild(opt);
      sel.disabled = true;
    } else {
      sel.disabled = false;
      _projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.project_id; opt.textContent = p.project_name;
        sel.appendChild(opt);
      });
    }
  }

  // Load projects on page start
  loadProjects();

  function show(elId, data, ok, warn) {
    const el = document.getElementById(elId);
    el.textContent = JSON.stringify(data, null, 2);
    el.className = 'output ' + (warn ? 'warn' : (ok ? 'ok' : 'error'));
  }

  // ── Error rendering ──
  const _ERROR_LABELS = {
    platform_unavailable: 'Platform Unavailable',
    task_not_found: 'Task Not Found',
    validation_error: 'Validation Error',
    already_decided: 'Already Decided',
    terminal_state: 'Terminal State',
    unknown: 'Error',
  };

  function _esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderError(el, errorType, message) {
    const label = _ERROR_LABELS[errorType] || 'Error';
    el.innerHTML = `<div class="output error"><strong>${label}</strong><br>${_esc(message)}</div>`;
  }

  // ── Projects ──
  async function doCreateProject() {
    const name = document.getElementById('proj-name').value.trim();
    const status = document.getElementById('proj-status').value.trim();
    const owner = document.getElementById('proj-owner').value.trim();
    if (!name) { alert('Project name is required'); return; }
    const body = { name };
    if (status) body.status = status;
    if (owner) body.owner = owner;
    const out = document.getElementById('proj-output');
    try {
      const r = await fetch(`${BASE}/projects`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      show('proj-output', d, d.ok, false);
      if (d.ok) {
        document.getElementById('proj-name').value = '';
        document.getElementById('proj-owner').value = '';
        loadProjects();
      }
    } catch(e) {
      show('proj-output', { error: e.message }, false, false);
    }
  }

  // ── Gate Panel ──
  async function doLoadGate() {
    const taskId = document.getElementById('gate-task-id').value.trim();
    if (!taskId) { alert('Task ID required'); return; }
    const panel = document.getElementById('gate-panel');
    panel.innerHTML = ''; // clear stale state
    try {
      const r = await fetch(`${BASE}/gate/${encodeURIComponent(taskId)}`);
      const d = await r.json();
      if (!d.ok) {
        renderError(panel, d.error_type || 'unknown', d.message || 'Failed to load gate');
        return;
      }
      renderGatePanel(d);
    } catch(e) {
      renderError(panel, 'platform_unavailable', 'Cannot reach PMO backend — platform may be unavailable.');
    }
  }

  function renderGatePanel(d) {
    const panel = document.getElementById('gate-panel');
    const badgeClass = d.gate_status === 'approved' ? 'badge-approved'
                     : d.gate_status === 'rejected' ? 'badge-rejected'
                     : d.gate_status === 'no_gate' ? 'badge-rejected'
                     : 'badge-pending';
    const badgeLabel = d.gate_status === 'approved' ? 'Already approved'
                     : d.gate_status === 'rejected' ? 'Already rejected'
                     : d.gate_status === 'no_gate' ? 'No gate'
                     : 'Pending decision';

    const gateLabel = d.gate_type && d.gate_type !== 'stage_advance'
      ? d.gate_type.replace(/_/g, ' ')
      : `${d.gate_stage} Gate`;

    let decisionHTML = '';
    if (d.gate_status === 'no_gate') {
      decisionHTML = `<div class="gate-already-decided" style="background:#64748b20;color:#94a3b8;border-color:#64748b40">${_esc(d.message || 'No gate action available at this stage.')}</div>`;
    } else if (d.gate_status === 'pending') {
      decisionHTML = `
        <div class="gate-decision-area">
          <div class="form-row">
            <textarea id="gate-notes" placeholder="Decision note (optional — annotation only, not governance evidence)"></textarea>
          </div>
          <div class="form-row">
            <input id="gate-actor" placeholder="Your name / role" style="max-width:200px" />
            <button class="success" onclick="doGateApprove('${d.task_id}', '${d.gate_stage}')">Approve</button>
            <button class="danger" onclick="doGateReject('${d.task_id}', '${d.gate_stage}')">Reject</button>
          </div>
        </div>`;
    } else {
      const decidedClass = d.gate_status === 'approved' ? 'already-approved' : 'already-rejected';
      const decidedLabel = d.gate_status === 'approved' ? 'Already approved' : 'Already rejected';
      const decidedBy = d.gate_decision_by ? ` by ${d.gate_decision_by}` : '';
      const decidedAt = d.gate_decided_at ? `<br>${new Date(d.gate_decided_at).toLocaleString()}` : '';
      const decidedNote = d.gate_decision_note ? `<br>Note: ${_esc(d.gate_decision_note)}` : '';
      decisionHTML = `<div class="gate-already-decided ${decidedClass}">${decidedLabel}${decidedBy}${decidedAt}${decidedNote}</div>`;
    }

    const evidenceNote = d.gate_decision_note
      ? `<div class="gate-evidence-note">${_esc(d.gate_decision_note)}</div>`
      : '<div class="gate-evidence-note">Evidence pending — does not block your decision.</div>';

    panel.innerHTML = `
      <div class="gate-panel">
        <div class="gate-header">
          <div>
            <div class="gate-title">${_esc(d.task_title)}</div>
            <div class="gate-task-id">${d.task_id}</div>
          </div>
          <span class="gate-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <dl class="gate-meta">
          <dt>Stage</dt><dd>${d.current_stage}</dd>
          <dt>Gate</dt><dd>${gateLabel}</dd>
          <dt>Owner</dt><dd>${d.current_owner || '—'}</dd>
        </dl>
        <div class="gate-evidence">
          <div class="gate-evidence-title">Evidence summary</div>
          <div>Evidence is drafted by BA/Jarvis. PMO displays only.</div>
          ${evidenceNote}
        </div>
        ${decisionHTML}
      </div>`;
  }

  async function doGateApprove(taskId, stage) {
    const actor = document.getElementById('gate-actor').value.trim();
    const notes = document.getElementById('gate-notes').value.trim();
    if (!actor) { alert('Your name/role is required'); return; }
    const panel = document.getElementById('gate-panel');
    try {
      const r = await fetch(`${BASE}/gate/approve`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({task_id: taskId, gate_name: stage + '_GATE', actor, notes}),
      });
      const d = await r.json();
      if (d.ok) {
        panel.innerHTML += `<div class="output ok" style="margin-top:0.5rem">${d.message}</div>`;
        setTimeout(() => doLoadGate(), 800);
      } else {
        renderError(panel, d.error_type || 'unknown', d.message || 'Approve failed');
      }
    } catch(e) {
      renderError(panel, 'platform_unavailable', 'Cannot reach PMO backend.');
    }
  }

  async function doGateReject(taskId, stage) {
    const actor = document.getElementById('gate-actor').value.trim();
    const notes = document.getElementById('gate-notes').value.trim();
    if (!actor) { alert('Your name/role is required'); return; }
    if (!notes) { alert('Rejection reason is required'); return; }
    const panel = document.getElementById('gate-panel');
    try {
      const r = await fetch(`${BASE}/gate/reject`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({task_id: taskId, gate_name: stage + '_GATE', actor, notes}),
      });
      const d = await r.json();
      if (d.ok) {
        panel.innerHTML += `<div class="output ok" style="margin-top:0.5rem">${d.message}</div>`;
        setTimeout(() => doLoadGate(), 800);
      } else {
        renderError(panel, d.error_type || 'unknown', d.message || 'Reject failed');
      }
    } catch(e) {
      renderError(panel, 'platform_unavailable', 'Cannot reach PMO backend.');
    }
  }

  // ── Status ──
  async function doStatus() {
    const taskId = document.getElementById('status-task-id').value.trim();
    if (!taskId) { alert('Task ID required'); return; }
    const outEl = document.getElementById('status-output');
    outEl.textContent = 'Loading...';
    outEl.className = 'output';
    try {
      const r = await fetch(`${BASE}/status/${encodeURIComponent(taskId)}`);
      const d = await r.json();
      if (d.ok) {
        show('status-output', d, true);
      } else {
        renderError(outEl, d.error_type || 'unknown', d.message || 'Failed to load status');
      }
    } catch(e) {
      renderError(outEl, 'platform_unavailable', 'Cannot reach PMO backend.');
    }
  }

  // ── Kickoff ──
  async function doKickoff() {
    const projectId = document.getElementById('kickoff-project').value.trim();
    if (!projectId) { alert('Project must be selected — create one first if none exist'); return; }
    const body = {
      title: document.getElementById('kickoff-title').value.trim(),
      project_id: projectId,
      description: document.getElementById('kickoff-description').value.trim(),
      priority: parseInt(document.getElementById('kickoff-priority').value) || 2,
      assignee: document.getElementById('kickoff-assignee').value.trim(),
      actor: document.getElementById('kickoff-actor').value.trim(),
    };
    if (!body.title || !body.description || !body.actor) {
      alert('Title, Description, and Your name are required'); return;
    }
    const outEl = document.getElementById('kickoff-output');
    outEl.textContent = 'Loading...';
    outEl.className = 'output';
    try {
      const r = await fetch(`${BASE}/kickoff`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.ok) {
        show('kickoff-output', d, true);
      } else {
        renderError(outEl, d.error_type || 'unknown', d.message || 'Kickoff failed');
      }
    } catch(e) {
      renderError(outEl, 'platform_unavailable', 'Cannot reach PMO backend.');
    }
  }

  // ── List ──
  async function doList() {
    const projectId = document.getElementById('list-project').value.trim();
    if (!projectId) { alert('Project ID required'); return; }
    const outEl = document.getElementById('list-output');
    outEl.textContent = 'Loading...';
    outEl.className = 'output';
    try {
      const r = await fetch(`${BASE}/tasks/${encodeURIComponent(projectId)}`);
      const d = await r.json();
      if (d.ok) {
        show('list-output', d, true);
      } else {
        renderError(outEl, d.error_type || 'unknown', d.message || 'Failed to list tasks');
      }
    } catch(e) {
      renderError(outEl, 'platform_unavailable', 'Cannot reach PMO backend.');
    }
  }
</script>
</body>
</html>
